<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goofy Badminton</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="page-layout">
    <aside id="sidebar">
      <button id="btn-1player" class="mode-btn active">1 player game</button>
      <button id="btn-2player" class="mode-btn">2 player game</button>
      <button id="btn-start">Start game</button>
      <button id="btn-reset">Reset</button>
    </aside>
    <div id="wrapper">
      <h1>Goofy Badminton</h1>
      <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600">
          Your browser does not support the HTML5 canvas element. Please upgrade to a modern browser to play Goofy Badminton.
        </canvas>
      </div>
      <p id="controls-hint">Use ← → to move, ↓ to swing</p>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
